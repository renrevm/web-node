<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensajes (Node + MySQL)</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f6f7fb; color: #111; }
    .wrap { max-width: 820px; margin: 40px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.08); padding: 18px; }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .sub { margin: 0 0 16px; color: #555; font-size: 14px; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input[type="text"] { flex: 1; min-width: 220px; padding: 12px 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
    input[type="text"]:focus { border-color: #9aa6ff; box-shadow: 0 0 0 3px rgba(90,110,255,.15); }

    button { padding: 12px 14px; border: 0; border-radius: 10px; cursor: pointer; font-weight: 600; }
    .btn { background: #5562ff; color: #fff; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .btn2 { background: #eef0ff; color: #2a2f7a; }

    .bar { display:flex; justify-content: space-between; align-items:center; gap: 10px; margin-top: 14px; }
    .pill { font-size: 12px; background: #f0f1f7; padding: 6px 10px; border-radius: 999px; color: #333; }

    .list { margin-top: 14px; border-top: 1px solid #eee; }
    .item { display:flex; gap: 10px; padding: 12px 4px; border-bottom: 1px solid #f0f0f0; }
    .id { width: 44px; font-weight: 700; color: #5562ff; }
    .txt { flex: 1; }
    .dt { width: 190px; text-align: right; color: #666; font-size: 12px; white-space: nowrap; }

    .msg { margin-top: 10px; font-size: 13px; }
    .ok { color: #0a7a2f; }
    .err { color: #b00020; }
    .muted { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>📬 Mensajes</h1>
      <p class="sub">Ejemplo Node.js + Express + MySQL (Hostinger)</p>

      <div class="row">
        <input id="txt" type="text" placeholder="Escribe un mensaje..." maxlength="255" />
        <button id="btnGuardar" class="btn">Guardar</button>
        <button id="btnRefrescar" class="btn2">Refrescar</button>
      </div>

      <div class="bar">
        <div class="pill" id="estado">Estado: listo</div>
        <div class="pill" id="contador">0 mensajes</div>
      </div>

      <div id="feedback" class="msg muted"></div>

      <div class="list" id="lista"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function setEstado(texto, tipo) {
      $("estado").textContent = "Estado: " + texto;
      const fb = $("feedback");
      fb.className = "msg " + (tipo || "muted");
      fb.textContent = texto;
    }

    function escapeHtml(str) {
      return (str || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    function formatFecha(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleString("es-CL");
    }

    async function cargarMensajes() {
      $("btnRefrescar").disabled = true;
      setEstado("cargando mensajes…", "muted");

      try {
        const res = await fetch("/api/mensajes", { cache: "no-store" });
        const data = await res.json();

        $("contador").textContent = `${data.length} mensaje(s)`;

        const html = data.map(m => `
          <div class="item">
            <div class="id">#${m.id}</div>
            <div class="txt">${escapeHtml(m.texto)}</div>
            <div class="dt">${formatFecha(m.creado_en)}</div>
          </div>
        `).join("");

        $("lista").innerHTML = html || `<div class="item"><div class="txt muted">Aún no hay mensajes.</div></div>`;
        setEstado("listo", "ok");
      } catch (e) {
        console.error(e);
        setEstado("error cargando mensajes", "err");
      } finally {
        $("btnRefrescar").disabled = false;
      }
    }

    async function guardarMensaje() {
      const texto = $("txt").value.trim();
      if (!texto) return setEstado("escribe un mensaje primero", "err");

      $("btnGuardar").disabled = true;
      setEstado("guardando…", "muted");

      try {
        const res = await fetch("/api/mensajes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto })
        });

        const txt = await res.text();

        if (!res.ok) {
          console.error("POST error:", txt);
          setEstado("error guardando: " + txt, "err");
          return;
        }

        $("txt").value = "";
        setEstado("guardado ✅", "ok");
        await cargarMensajes();
      } catch (e) {
        console.error(e);
        setEstado("error guardando", "err");
      } finally {
        $("btnGuardar").disabled = false;
      }
    }

    $("btnRefrescar").addEventListener("click", cargarMensajes);
    $("btnGuardar").addEventListener("click", guardarMensaje);
    $("txt").addEventListener("keydown", (e) => {
      if (e.key === "Enter") guardarMensaje();
    });

    // Carga inicial
    cargarMensajes();
  </script>
</body>
</html>
